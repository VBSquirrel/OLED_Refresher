name: build

# Compile-checks the app on a Windows runner for every push and PR.
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore OledRefresher.sln

      - name: Build (Release)
        run: dotnet build OledRefresher.sln -c Release --no-restore

      - name: Publish (self-contained single file)
        run: >
          dotnet publish src/OledRefresher/OledRefresher.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true -p:DebugType=none
          -o publish

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: OledRefresher-win-x64
          path: publish/OledRefresher.exe
          if-no-files-found: error
